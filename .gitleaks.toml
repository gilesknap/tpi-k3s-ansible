[extend]
# Use the default gitleaks rules
useDefault = true

# SealedSecrets are encrypted and safe to store in Git.
# The sealed-secrets controller holds the private key; these
# ciphertext values cannot be decrypted without it.
[allowlist]
paths = [
  '''.*-secret\.yaml$''',
]
# GitHub OAuth App client IDs are public (they travel in the OAuth
# authorize URL), not secrets. thoth's chart takes the client id as
# non-secret config in the Application valuesObject, where gitleaks'
# generic-api-key rule flags it on entropy. The matching client SECRET
# lives only in the sealed thoth-env Secret.
regexes = [
  '''Ov23li[0-9A-Za-z]+''',
]
