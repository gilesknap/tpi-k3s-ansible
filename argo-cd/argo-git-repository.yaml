apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: all-cluster-services
  namespace: argo-cd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-cd
  project: kubernetes
  source:
    path: ./kubernetes-services
    repoURL: >-
      {{ repo_remote }}
    targetRevision: >-
      {{ repo_branch }}
    helm:
      valuesObject:
        # Pass down variables so child apps are also parameterized.
        # repo_branch is passed here (not read from values.yaml) so that
        # branch switching only requires changing group_vars/all.yml and
        # running --tags cluster — no need to push to the target branch.
        repo_branch: "{{ repo_branch }}"
        repo_remote: "{{ repo_remote }}"
        cluster_domain: "{{ cluster_domain }}"
        domain_email: "{{ domain_email }}"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
