apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: "argocd-ingress"
  annotations:
    kubernetes.io/tls-acme: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/auth-url: "https://oauth2.{{ cluster_domain }}/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://oauth2.{{ cluster_domain }}/oauth2/start?rd=$scheme://$host$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-User,X-Auth-Request-Email"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - argocd.{{ cluster_domain }}
      secretName: argocd-secret
  rules:
    - host: argocd.{{ cluster_domain }}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
