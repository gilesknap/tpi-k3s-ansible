# Description:
# This file contains variables common to all the hosts in the inventory.

# The user to create on each node for access by ansible
ansible_account: "ansible"
# The user used to connect to the tpi BMC(s)
tpi_user: root
# A path to some storage on the tpi BMC(s) used for downloading os images
tpi_images_path: /mnt/sdcard/images
# ansible vault password file
vault_password_file: "~/.ansible_vault_password"

# location of binaries we install in the execution environment
bin_dir: "{{ lookup('ansible.builtin.env', 'BIN_DIR', default='${HOME}/bin') }}"

# control_plane_ip is set as a fact at the start of the k3s role (roles/k3s/tasks/main.yml)
# It cannot be defined here because hostvars is not available during group_vars evaluation.

# uncomment for a specific version of k3s (see https://github.com/k3s-io/k3s/releases)
# k3s_version:. v1.29.11+k3s1

# override on command line to make flashing of turing pi nodes happen
# (note that any node that is turned off in tpi will get flashed)
# passing flash_force=true will also force re-flash of already-running nodes
do_flash: "{{ (flash_force | default(force_flash | default(false))) | bool }}"

################################################################################
# EDIT BELOW ###################################################################
# The remaining variables are for personalization of the cluster ###############
################################################################################

local_domain: .lan # how to address local nodes with dig
control_plane: node01 # the node name of the (single) control plane
cluster_domain: gkcluster.org # the DNS name for the cluster control plane node
domain_email: giles.knap@gilesk.gkcluster.org # the email address for letsencrypt

# Admin emails for ArgoCD RBAC mapping (Ansible-rendered templates).
# Must be kept in sync with admin_emails in kubernetes-services/values.yaml.
admin_emails:
  - gilesknap@gmail.com
  - giles.knap@diamond.ac.uk
# where argocd will get the cluster configuration from
repo_remote: https://github.com/gilesknap/tpi-k3s-ansible.git
# Single source of truth for branch tracking. Change this and run
# ansible-playbook pb_all.yml --tags cluster to switch branches.
# The root app passes this down to all child apps via valuesObject.
repo_branch: main

# Set nvidia_gpu_node: true in host_vars/<nodename>.yml (or inline in hosts.yml)
# for any node that has an NVIDIA GPU. This triggers NVIDIA container toolkit
# installation and containerd runtime configuration so that GPU pods can run.
# The default is false — safe to leave unset on non-GPU nodes.
nvidia_gpu_node: false

# List of features to install into the cluster, comment out to remove.
# Each entry must match the name of a tasks yaml file in the cluster role.
# This is for direct installs before ArgoCD is used to manage the cluster.
cluster_install_list:
  - argocd # the remaining services are all managed by argocd at present

# Host directories that back the local-nvme PVs. Created by the
# k8s_data_dirs role on each app's target node. Paths live outside
# /var/lib/rancher on purpose: pb_decommission.yml wipes
# /var/lib/rancher to reset k3s, but these directories are preserved
# so PVC data survives a cluster rebuild.
#
# SYNC: each entry's `node` and `path` MUST match the corresponding
# entry in `local_storage` in kubernetes-services/values.yaml. The two
# files are intentionally separate (Ansible vs Helm), but the
# node/path pair is the contract between them — if they drift, the
# PV's nodeAffinity will point at a directory that doesn't exist.
#
# UID/GID notes: grafana (472) and prometheus (1000/2000) come from
# the live cluster's effective securityContext. supabase-db,
# supabase-storage and open-webui have nil securityContext so the
# image's default UID applies — 0777/root is a safe fallback. minio
# uses fsGroup 65532 so 65532:65532 keeps the init container's chown
# a no-op.
k8s_data_dirs:
  - name: supabase-db
    node: nuc2
    path: /home/k8s-data/supabase-db
    owner: root
    group: root
    mode: "0777"
  - name: supabase-storage
    node: nuc2
    path: /home/k8s-data/supabase-storage
    owner: root
    group: root
    mode: "0777"
  - name: supabase-minio
    node: nuc2
    path: /home/k8s-data/supabase-minio
    owner: "65532"
    group: "65532"
    mode: "0755"
  - name: prometheus
    node: node02
    path: /var/lib/k8s-data/prometheus
    owner: "1000"
    group: "2000"
    mode: "0755"
  - name: grafana
    node: node03
    path: /var/lib/k8s-data/grafana
    owner: "472"
    group: "472"
    mode: "0755"
  - name: open-webui
    node: node04
    path: /var/lib/k8s-data/open-webui
    owner: root
    group: root
    mode: "0777"
