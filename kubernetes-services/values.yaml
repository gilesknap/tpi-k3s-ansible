# repo_branch is injected by the root app's valuesObject (from
# group_vars/all.yml). This default is only used if the root app
# does not pass it down (e.g. during local helm template testing).
repo_branch: main
# NFS storage for RKLLama models — edit these to match your NFS server.
# This is the single place to configure NFS for rkllama; ArgoCD injects
# these values into the rkllama Helm chart at sync time.
rkllama:
  nfs:
    server: 192.168.1.3 # IP address of your NFS server
    path: /bigdisk/k8s-cluster/models # subdir of the cluster-owned NFS share
  # The single node the rkllama DaemonSet runs on. Pinned by hostname
  # because the model files (loaded into the Rockchip NPU) are large
  # enough that running on every RK1 would exhaust RAM. Change to one
  # of your RK1 nodes when forking; default matches this cluster's
  # node04 (32GB RAM).
  node: node04
# llama.cpp CUDA server configuration.
# Uses a separate NFS subdirectory from rkllama — the two backends use
# incompatible model formats (GGUF for CUDA vs RKLLM for ARM NPU) so
# co-locating them in the same folder would cause confusion.
# model.file: filename of the GGUF model relative to the NFS path root.
# model.gpuLayers: number of transformer layers to offload to GPU (99 = all).
# model.contextSize: KV-cache context length in tokens.
# model.parallel: number of concurrent request slots (one per simultaneous user).
# model.memoryLimit: Kubernetes memory limit for the container (VRAM + system RAM).
llamacpp:
  nfs:
    server: 192.168.1.3 # IP address of your NFS server
    path: /bigdisk/k8s-cluster/models/cuda # separate subdir from rkllama (GGUF models only)
  model:
    file: "deepseek-coder-33b-instruct.Q4_K_M.gguf" # GGUF model file on your NFS share
    gpuLayers: 99 # offload all layers; reduce if GPU VRAM is insufficient
    contextSize: 8192 # reduce for large models that leave little VRAM for KV cache
    parallel: 2 # reduce for large models; 33B Q5 leaves ~200MB for KV cache
    memoryLimit: "20Gi"
# OAuth2 authentication gateway.
# Set to true AFTER completing the OAuth setup guide (docs/how-to/oauth-setup).
# When false, services are accessible without OAuth authentication.
enable_oauth2_proxy: true
# Cloudflare Tunnel for web services.
# Set to true AFTER adding public hostnames in the Cloudflare Zero Trust
# dashboard (docs/how-to/cloudflare-web-tunnel).
# When true, disables ssl-redirect on tunnelled services so Cloudflare's
# edge TLS termination works without redirect loops.
enable_cloudflare_tunnel: true
# Cloudflare Zero Trust team name (the subdomain in
# <team>.cloudflareaccess.com). Used by the test-oauth-flow skill to
# build the CF Access logout URL.
cf_access_team: gilesk
# Admin email addresses — full access to all services.
# These emails get: ArgoCD admin, Grafana Admin, Open WebUI admin,
# oauth2-proxy access (Longhorn, Supabase Studio).
# Must be kept in sync with admin_emails in group_vars/all.yml.
admin_emails:
  - gilesknap@gmail.com
  - giles.knap@diamond.ac.uk
# Viewer access is not listed here. Entry to Dex-authenticated services is
# gated at the edge by the Cloudflare Access application's one-time-PIN
# email allowlist (managed in the Cloudflare Zero Trust dashboard). Anyone
# who passes CF Access and authenticates via GitHub (Dex) lands in the
# default Viewer role — Grafana Viewer, Open WebUI user, ArgoCD readonly.
# Admin rights are still granted explicitly via admin_emails above.
# oauth2-proxy-gated services (Longhorn, Supabase Studio, Headlamp)
# remain admin-only and ignore this default.
# Supabase self-hosted stack for Open Brain AI memory.
# Provides database, auth, PostgREST, Edge Functions, Studio, and Kong gateway.
enable_supabase: true
supabase:
  nfs:
    server: 192.168.1.3
    path: /bigdisk/k8s-cluster/supabase-dumps
# Helm release name for the upstream supabase chart (the value passed
# to `helm install <name>`). The chart prefixes every Service/Secret
# with this name, so the in-cluster Postgres service is
# `<release>-supabase-db`. Change here AND in the supabase ArgoCD
# Application's `releaseName` if you want to rename the release.
supabase_release_name: supabase
# Open Brain MCP server — standalone FastAPI service for Claude.ai MCP connector.
# Provides thought storage and retrieval via the Supabase Postgres database.
enable_open_brain_mcp: true
open_brain_mcp:
  # Container image. Fork the upstream open-brain-mcp repo and point
  # this at your fork to deploy your own build.
  image_repository: ghcr.io/gilesknap/open-brain-mcp
  image_tag: latest
  # Comma-separated GitHub usernames allowed to authenticate to the
  # MCP server. Forkers should set this to their own GitHub login(s).
  github_allowed_users: "gilesknap"
# Cluster-owned NFS share on the NAS — single managed subtree under the
# existing bigdisk export (set up manually via docs/how-to/nas-setup.md).
# Hosts backup targets AND the hostPath-mirrored model/dump subdirs that
# rkllama/llamacpp/supabase-db-data also point at.
nfs:
  server: 192.168.1.3
  cluster_share_path: /bigdisk/k8s-cluster
# Local-storage PV map — node-pinned hostPath PVs that survive cluster
# rebuild (data lives outside /var/lib/rancher). Each entry becomes one
# PV, pre-bound via claimRef to the chart-generated PVC of the workload
# that uses it. Edit `node` and `path` here to retarget data placement
# when forking; keep `claim_namespace`/`claim_name` matching the
# workload chart's PVC naming convention. The matching directories must
# exist on the target nodes — see `k8s_data_dirs` in
# group_vars/all.yml (Ansible creates them).
local_storage:
  grafana:
    node: node03
    path: /var/lib/k8s-data/grafana
    capacity: 30Gi
    claim_namespace: monitoring
    # Grafana StatefulSet PVC (kube-prometheus-stack):
    # <vct-name>-<sts-name>-<ordinal> = storage-grafana-prometheus-0.
    claim_name: storage-grafana-prometheus-0
  prometheus:
    node: node02
    path: /var/lib/k8s-data/prometheus
    capacity: 40Gi
    claim_namespace: monitoring
    # Prometheus Operator-generated PVC name; the release name appears
    # twice (chart name + STS name). Do not "simplify" — it must match
    # what the operator creates verbatim.
    claim_name: prometheus-grafana-prometheus-kube-pr-prometheus-db-prometheus-grafana-prometheus-kube-pr-prometheus-0
  open_webui:
    node: node04
    path: /var/lib/k8s-data/open-webui
    capacity: 5Gi
    claim_namespace: open-webui
    claim_name: open-webui
  supabase_db:
    node: nuc2
    path: /home/k8s-data/supabase-db
    capacity: 50Gi
    claim_namespace: supabase
    claim_name: supabase-db
  supabase_storage:
    node: nuc2
    path: /home/k8s-data/supabase-storage
    capacity: 50Gi
    claim_namespace: supabase
    claim_name: supabase-storage
  supabase_minio:
    node: nuc2
    path: /home/k8s-data/supabase-minio
    capacity: 50Gi
    claim_namespace: supabase
    claim_name: supabase-minio
