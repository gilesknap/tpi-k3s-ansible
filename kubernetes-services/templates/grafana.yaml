apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-prometheus
  namespace: argo-cd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  project: kubernetes
  sources:
    - chart: kube-prometheus-stack
      targetRevision: 83.4.3
      repoURL:  https://prometheus-community.github.io/helm-charts
      helm:
        valuesObject:
          # https://github.dev/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml

          grafana:
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
            admin:
              existingSecret: admin-auth
              userKey: user
              passwordKey: password
            envFromSecrets:
              - name: grafana-oauth-secret
                optional: false
            grafana.ini:
              server:
                root_url: https://grafana.{{ .Values.cluster_domain }}
              users:
                allow_sign_up: true
              auth:
                disable_signup_form: true
                disable_login_form: true
              auth.generic_oauth:
                enabled: true
                name: GitHub (via Dex)
                client_id: grafana
                client_secret: $__env{CLIENT_SECRET}
                auth_url: https://argocd.{{ .Values.cluster_domain }}/api/dex/auth
                token_url: https://argocd.{{ .Values.cluster_domain }}/api/dex/token
                api_url: https://argocd.{{ .Values.cluster_domain }}/api/dex/userinfo
                scopes: openid profile email
                allow_sign_up: true
                email_attribute_path: email
                login_attribute_path: email
                name_attribute_path: name
                use_pkce: true
                tls_skip_verify_insecure: true
                role_attribute_path: "({{- range $i, $e := .Values.admin_emails }}{{- if $i }} || {{ end }}email == '{{ $e }}'{{- end }}) && 'Admin' || 'Viewer'"
                role_attribute_strict: true
            persistence:
              enabled: true
              type: sts
              # Static local-nvme PV (additions/local-storage) pre-bound to
              # the storage-grafana-prometheus-0 PVC with nodeAffinity: node03.
              storageClassName: local-nvme
              accessModes:
                - ReadWriteOnce
              size: 30Gi
              finalizers:
                - kubernetes.io/pvc-protection
            tolerations:
              - key: workstation
                operator: Equal
                value: "true"
                effect: NoSchedule

          prometheus:
            annotations:
              argocd.argoproj.io/skip-health-check: "true"
            prometheusSpec:
              storageSpec:
                volumeClaimTemplate:
                  spec:
                    # Static local-nvme PV (additions/local-storage) pre-bound
                    # via claimRef to the operator-generated PVC, nodeAffinity: node02.
                    storageClassName: local-nvme
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 40Gi
              tolerations:
                - key: workstation
                  operator: Equal
                  value: "true"
                  effect: NoSchedule

          alertmanager:
            ingress:
              enabled: true
              ingressClassName: nginx
              annotations:
                nginx.ingress.kubernetes.io/auth-url: "http://oauth2-proxy.oauth2-proxy.svc.cluster.local/oauth2/auth"
                nginx.ingress.kubernetes.io/auth-signin: "https://oauth2.{{ .Values.cluster_domain }}/oauth2/start?rd=https://$host$escaped_request_uri"
                nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-User,X-Auth-Request-Email"
{{- if .Values.enable_cloudflare_tunnel }}
                nginx.ingress.kubernetes.io/ssl-redirect: "false"
{{- end }}
              hosts:
                - alertmanager.{{ .Values.cluster_domain }}
              tls:
                - hosts:
                    - alertmanager.{{ .Values.cluster_domain }}
            alertmanagerSpec:
              tolerations:
                - key: workstation
                  operator: Equal
                  value: "true"
                  effect: NoSchedule
              secrets:
                - alertmanager-slack-secret
            config:
              route:
                receiver: slack
                group_by:
                  - alertname
                  - namespace
                group_wait: 30s
                group_interval: 5m
                repeat_interval: 4h
              receivers:
                - name: slack
                  slack_configs:
                    - channel: '#alerts'
                      send_resolved: true
                      api_url_file: /etc/alertmanager/secrets/alertmanager-slack-secret/webhook-url
                # Required by the chart-default Watchdog sub-route, which Helm
                # preserves because route is a dict (deep-merged) while
                # receivers is a list (replaced). Dropping this re-breaks
                # Alertmanager reconciliation with "undefined receiver null".
                - name: "null"

          prometheusOperator:
            admissionWebhooks:
              # Disabled: hook jobs (admission-create/patch) delete themselves before
              # ArgoCD records Succeeded, causing every sync to get permanently stuck.
              # Same fix as ingress-nginx (eaaa0f1). The webhook validates CRD syntax
              # but is not required for operation.
              enabled: false
            tolerations:
              - key: workstation
                operator: Equal
                value: "true"
                effect: NoSchedule

          kube-state-metrics:
            tolerations:
              - key: workstation
                operator: Equal
                value: "true"
                effect: NoSchedule

          # K3s bundles scheduler, controller-manager and kube-proxy into the
          # k3s-server process — there are no pods with component=kube-scheduler
          # etc., so the chart-default Services end up with empty endpoints and
          # the matching Down alert rules fire via absent(up{...}). Disable both
          # the scrape targets and the default rules. The same components are
          # still visible via the apiserver and kubelet ServiceMonitors.
          kubeControllerManager:
            enabled: false
          kubeScheduler:
            enabled: false
          kubeProxy:
            enabled: false
          defaultRules:
            rules:
              kubeControllerManager: false
              kubeScheduler: false
              kubeProxyAlerting: false

    - path: ./kubernetes-services/additions/grafana
      repoURL: {{ .Values.repo_remote }}
      targetRevision: {{ .Values.repo_branch }}

    - path: ./kubernetes-services/additions/ingress
      repoURL: {{ .Values.repo_remote }}
      targetRevision: {{ .Values.repo_branch }}
      helm:
        valuesObject:
          name: grafana
          cluster_domain: {{ .Values.cluster_domain }}
          service_name: grafana-prometheus
          service_port: 80
          oauth2_proxy: false
          ssl_redirect: {{ if .Values.enable_cloudflare_tunnel }}false{{ else }}true{{ end }}
  ignoreDifferences:
  - group: apps
    kind: StatefulSet
    name: grafana-prometheus
    namespace: monitoring
    jqPathExpressions:
    - .spec.volumeClaimTemplates[].metadata.creationTimestamp
    - .spec.volumeClaimTemplates[].status
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    # see https://prometheus-operator.dev/docs/platform/troubleshooting/#customresourcedefinition--is-invalid-metadataannotations-too-long-issue
    - ServerSideApply=true
    - CreateNamespace=true
