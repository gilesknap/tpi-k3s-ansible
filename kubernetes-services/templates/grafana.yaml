apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-prometheus
  namespace: argo-cd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  project: kubernetes
  sources:
    - chart: kube-prometheus-stack
      targetRevision: 82.13.0
      repoURL:  https://prometheus-community.github.io/helm-charts
      helm:
        valuesObject:
          # https://github.dev/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml

          grafana:
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
            admin:
              existingSecret: admin-auth
              userKey: user
              passwordKey: password
            persistence:
              enabled: true
              type: sts
              storageClassName: longhorn
              accessModes:
                - ReadWriteOnce
              size: 30Gi
              finalizers:
                - kubernetes.io/pvc-protection
            tolerations:
              - key: workstation
                operator: Equal
                value: "true"
                effect: NoSchedule

          prometheus:
            annotations:
              argocd.argoproj.io/skip-health-check: "true"
            prometheusSpec:
              storageSpec:
                volumeClaimTemplate:
                  spec:
                    storageClassName: longhorn
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 40Gi
              tolerations:
                - key: workstation
                  operator: Equal
                  value: "true"
                  effect: NoSchedule

          alertmanager:
            alertmanagerSpec:
              tolerations:
                - key: workstation
                  operator: Equal
                  value: "true"
                  effect: NoSchedule

          prometheusOperator:
            admissionWebhooks:
              # Disabled: hook jobs (admission-create/patch) delete themselves before
              # ArgoCD records Succeeded, causing every sync to get permanently stuck.
              # Same fix as ingress-nginx (eaaa0f1). The webhook validates CRD syntax
              # but is not required for operation.
              enabled: false
            tolerations:
              - key: workstation
                operator: Equal
                value: "true"
                effect: NoSchedule

          kube-state-metrics:
            tolerations:
              - key: workstation
                operator: Equal
                value: "true"
                effect: NoSchedule

    - path: ./kubernetes-services/additions/ingress
      repoURL: {{ .Values.repo_remote }}
      targetRevision: {{ .Values.repo_branch }}
      helm:
        valuesObject:
          name: grafana
          cluster_domain: {{ .Values.cluster_domain }}
          service_name: grafana-prometheus
          service_port: 80
          oauth2_proxy: {{ .Values.enable_oauth2_proxy | default false }}
          ssl_redirect: {{ if .Values.enable_cloudflare_tunnel }}false{{ else }}true{{ end }}
  ignoreDifferences:
  - group: apps
    kind: StatefulSet
    name: grafana-prometheus
    namespace: monitoring
    jqPathExpressions:
    - .spec.volumeClaimTemplates[].metadata.creationTimestamp
    - .spec.volumeClaimTemplates[].status
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    # see https://prometheus-operator.dev/docs/platform/troubleshooting/#customresourcedefinition--is-invalid-metadataannotations-too-long-issue
    - ServerSideApply=true
    - CreateNamespace=true
