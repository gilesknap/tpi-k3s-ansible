apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-prometheus
  namespace: argo-cd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  project: kubernetes
  sources:
    - chart: kube-prometheus-stack
      targetRevision: 82.4.3
      repoURL:  https://prometheus-community.github.io/helm-charts
      helm:
        valuesObject:
          # https://github.dev/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml

          grafana:
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
            admin:
              existingSecret: admin-auth
              userKey: user
              passwordKey: password
            envFromSecrets:
              - name: grafana-oauth
                optional: true
            grafana.ini:
              server:
                root_url: https://grafana.{{ .Values.cluster_domain }}
              auth.generic_oauth:
                enabled: true
                name: GitHub
                client_id: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_ID}
                client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
                auth_url: https://github.com/login/oauth/authorize
                token_url: https://github.com/login/oauth/access_token
                api_url: https://api.github.com/user
                scopes: user:email
                allow_sign_up: true
                # Map emails to Grafana roles. JMESPath expression evaluated
                # against the GitHub /user API response (which has an `email` field).
                role_attribute_path: "contains([{{ range $i, $e := .Values.grafana_admin_emails | default list }}{{ if $i }}, {{ end }}'{{ $e }}'{{ end }}], email) && 'Admin' || 'Viewer'"
            persistence:
              enabled: true
              type: sts
              storageClassName: longhorn
              accessModes:
                - ReadWriteOnce
              size: 30Gi
              finalizers:
                - kubernetes.io/pvc-protection

          prometheus:
            annotations:
              argocd.argoproj.io/skip-health-check: "true"
            prometheusSpec:
              storageSpec:
                volumeClaimTemplate:
                  spec:
                    storageClassName: longhorn
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 40Gi

    - path: ./kubernetes-services/additions/ingress
      repoURL: {{ .Values.repo_remote }}
      targetRevision: {{ .Values.repo_branch }}
      helm:
        valuesObject:
          name: grafana
          cluster_domain: {{ .Values.cluster_domain }}
          service_name: grafana-prometheus
          service_port: 80
          oauth2_proxy: {{ .Values.enable_oauth2_proxy | default false }}
          ssl_redirect: {{ if .Values.enable_cloudflare_tunnel }}false{{ else }}true{{ end }}
  ignoreDifferences:
  - group: apps
    kind: StatefulSet
    name: grafana-prometheus
    namespace: monitoring
    jqPathExpressions:
    - .spec.volumeClaimTemplates[].metadata.creationTimestamp
    - .spec.volumeClaimTemplates[].status
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    # see https://prometheus-operator.dev/docs/platform/troubleshooting/#customresourcedefinition--is-invalid-metadataannotations-too-long-issue
    - ServerSideApply=true
    - CreateNamespace=true
