apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: open-webui
  namespace: argo-cd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: open-webui
  project: kubernetes
  sources:
    - chart: open-webui
      repoURL: https://helm.openwebui.com/
      targetRevision: 12.3.0
      helm:
        valuesObject:
          # https://github.com/open-webui/helm-charts/blob/main/charts/open-webui/values.yaml

          # Use rkllama (Ollama-compatible API) instead of deploying Ollama in-cluster.
          ollama:
            enabled: false
          ollamaUrls:
            - http://rkllama.rkllama.svc.cluster.local:8080

          # No Pipelines sidecar needed for basic LLM chat.
          pipelines:
            enabled: false

          # Disable built-in websocket/Redis — not needed for single-replica chat.
          websocket:
            enabled: false

          persistence:
            enabled: true
            storageClass: longhorn
            size: 5Gi

    - path: ./kubernetes-services/additions/ingress
      repoURL: {{ .Values.repo_remote }}
      targetRevision: {{ .Values.repo_branch }}
      helm:
        valuesObject:
          name: open-webui
          cluster_domain: {{ .Values.cluster_domain }}
          service_name: open-webui
          service_port: 80
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
