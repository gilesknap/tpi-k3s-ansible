apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: open-webui
  namespace: argo-cd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: open-webui
  project: kubernetes
  sources:
    - chart: open-webui
      repoURL: https://helm.openwebui.com/
      targetRevision: 14.2.0
      helm:
        valuesObject:
          # https://github.com/open-webui/helm-charts/blob/main/charts/open-webui/values.yaml

          # Use rkllama (Ollama-compatible API) instead of deploying Ollama in-cluster.
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          ollama:
            enabled: false
          ollamaUrls:
            - http://rkllama.rkllama.svc.cluster.local:8080   # RK1 NPU backend

          # No Pipelines sidecar needed for basic LLM chat.
          pipelines:
            enabled: false

          # Disable built-in websocket/Redis — not needed for single-replica chat.
          websocket:
            enabled: false

          extraEnvVars:
            - name: ENABLE_OAUTH_SIGNUP
              value: "true"
            - name: OAUTH_PROVIDER_NAME
              value: "GitHub"
            - name: OPENID_PROVIDER_URL
              value: "https://argocd.{{ .Values.cluster_domain }}/api/dex/.well-known/openid-configuration"
            - name: OAUTH_CLIENT_ID
              value: "open-webui"
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: open-webui-oauth-secret
                  key: client-secret
            - name: OAUTH_SCOPES
              value: "openid profile email"
            - name: OAUTH_ADMIN_EMAIL
              value: "{{ join "," .Values.admin_emails }}"
            - name: DEFAULT_USER_ROLE
              value: "user"
            - name: ENABLE_LOGIN_FORM
              value: "false"

          persistence:
            enabled: true
            # Static local-nvme PV (additions/local-storage) pre-bound to the
            # open-webui PVC with nodeAffinity: node04. Chart uses the
            # singular key 'storageClass' (not storageClassName).
            storageClass: local-nvme
            size: 5Gi

    - path: ./kubernetes-services/additions/open-webui
      repoURL: {{ .Values.repo_remote }}
      targetRevision: {{ .Values.repo_branch }}

    - path: ./kubernetes-services/additions/ingress
      repoURL: {{ .Values.repo_remote }}
      targetRevision: {{ .Values.repo_branch }}
      helm:
        valuesObject:
          name: open-webui
          cluster_domain: {{ .Values.cluster_domain }}
          service_name: open-webui
          service_port: 80
          oauth2_proxy: false
          ssl_redirect: {{ if .Values.enable_cloudflare_tunnel }}false{{ else }}true{{ end }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
