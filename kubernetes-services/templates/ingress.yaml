apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress
  namespace: argo-cd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  project: kubernetes
  source:
    chart: ingress-nginx
    targetRevision: 4.14.3
    repoURL:  https://kubernetes.github.io/ingress-nginx
    helm:
      valuesObject:
        controller:
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          minAvailable: 1
          admissionWebhooks:
            # Disabled: hook jobs (admission-create/patch) delete themselves before
            # ArgoCD records Succeeded, causing every sync to get permanently stuck.
            # The webhook validates ingress syntax but is not required for operation.
            enabled: false
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
