apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: echo
  namespace: argo-cd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: echo
  project: kubernetes
  sources:
    # Echo test service — Deployment and Service as plain manifests.
    # Exposed publicly via the Cloudflare tunnel at echo.<cluster_domain>.
    # Useful for verifying tunnel connectivity and TLS certificate issuance.
    - path: ./kubernetes-services/additions/echo
      repoURL: {{ .Values.repo_remote }}
      targetRevision: {{ .Values.repo_branch }}
    - path: ./kubernetes-services/additions/ingress
      repoURL: {{ .Values.repo_remote }}
      targetRevision: {{ .Values.repo_branch }}
      helm:
        valuesObject:
          name: echo
          cluster_domain: {{ .Values.cluster_domain }}
          service_name: echo
          service_port: 80
          ssl_redirect: false
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
