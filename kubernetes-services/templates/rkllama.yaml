apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rkllama
  namespace: argo-cd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: rkllama
  project: kubernetes
  sources:
    # All rkllama manifests (ConfigMap, DaemonSet, Service, Ingress) are plain YAML in additions/.
    # No external Helm chart — rkllama runs from upstream container image directly.
    - path: ./kubernetes-services/additions/rkllama
      repoURL: {{ .Values.repo_remote }}
      targetRevision: {{ .Values.repo_branch }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
