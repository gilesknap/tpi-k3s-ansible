apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rkllama
  namespace: argo-cd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: rkllama
  project: kubernetes
  sources:
    # rkllama Helm chart: ConfigMap, DaemonSet, Service, PV and PVC.
    # NFS server/path values are injected from kubernetes-services/values.yaml
    # so users only need to edit one place — no personal details are hardcoded here.
    - path: ./kubernetes-services/additions/rkllama
      repoURL: {{ .Values.repo_remote }}
      targetRevision: {{ .Values.repo_branch }}
      helm:
        valuesObject:
          nfs:
            server: {{ .Values.rkllama.nfs.server | quote }}
            path: {{ .Values.rkllama.nfs.path | quote }}
          node: {{ .Values.rkllama.node | quote }}
    - path: ./kubernetes-services/additions/ingress
      repoURL: {{ .Values.repo_remote }}
      targetRevision: {{ .Values.repo_branch }}
      helm:
        valuesObject:
          name: rkllama
          cluster_domain: {{ .Values.cluster_domain }}
          service_name: rkllama
          service_port: 8080
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
