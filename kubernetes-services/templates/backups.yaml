apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backups
  namespace: argo-cd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: backups
  project: kubernetes
  sources:
    # Per-app backup CronJobs writing to the single cluster-owned NFS share.
    # The chart creates one static NFS PV; each CronJob uses subPath to see
    # only its own backups/<app>/ subdirectory. The NFS share itself is
    # created manually on the NAS — see docs/how-to/nas-setup.md.
    - path: ./kubernetes-services/additions/backups
      repoURL: {{ .Values.repo_remote }}
      targetRevision: {{ .Values.repo_branch }}
      helm:
        valuesObject:
          nfs:
            server: {{ .Values.nfs.server | quote }}
            cluster_share_path: {{ .Values.nfs.cluster_share_path | quote }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
