apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp
  namespace: argo-cd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: headlamp
  project: kubernetes
  sources:
    # kubernetes-dashboard was archived Jan 2026; replaced by Headlamp (kubernetes-sigs)
    # Chart version: https://github.com/kubernetes-sigs/headlamp/releases
    - chart: headlamp
      targetRevision: 0.40.0
      repoURL: https://kubernetes-sigs.github.io/headlamp/

    - path: ./kubernetes-services/additions/dashboard
      repoURL: {{ .Values.repo_remote }}
      targetRevision: {{ .Values.repo_branch }}

    - path: ./kubernetes-services/additions/ingress
      repoURL: {{ .Values.repo_remote }}
      targetRevision: {{ .Values.repo_branch }}
      helm:
        valuesObject:
          name: headlamp
          cluster_domain: {{ .Values.cluster_domain }}
          service_name: headlamp
          service_port: 80
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
