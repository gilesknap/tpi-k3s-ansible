apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp
  namespace: argo-cd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: headlamp
  project: kubernetes
  sources:
    # kubernetes-dashboard was archived Jan 2026; replaced by Headlamp (kubernetes-sigs)
    # Chart version: https://github.com/kubernetes-sigs/headlamp/releases
    - chart: headlamp
      targetRevision: 0.40.0
      repoURL: https://kubernetes-sigs.github.io/headlamp/
      helm:
        valuesObject:
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          clusterRoleBinding:
            create: false  # managed by additions/dashboard/rbac.yaml

    - path: ./kubernetes-services/additions/dashboard
      repoURL: {{ .Values.repo_remote }}
      targetRevision: {{ .Values.repo_branch }}

    - path: ./kubernetes-services/additions/ingress
      repoURL: {{ .Values.repo_remote }}
      targetRevision: {{ .Values.repo_branch }}
      helm:
        valuesObject:
          name: headlamp
          cluster_domain: {{ .Values.cluster_domain }}
          service_name: headlamp
          service_port: 80
          oauth2_proxy: {{ .Values.enable_oauth2_proxy | default false }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
