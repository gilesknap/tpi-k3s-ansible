apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: llamacpp
  namespace: argo-cd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: llamacpp
  project: kubernetes
  sources:
    # llama.cpp CUDA server: Deployment, Service, PV and PVC.
    # NFS server/path and model values are injected from kubernetes-services/values.yaml
    # so users only need to edit one place — no personal details are hardcoded here.
    - path: ./kubernetes-services/additions/llamacpp
      repoURL: {{ .Values.repo_remote }}
      targetRevision: {{ .Values.repo_branch }}
      helm:
        valuesObject:
          nfs:
            server: {{ .Values.llamacpp.nfs.server | quote }}
            path: {{ .Values.llamacpp.nfs.path | quote }}
          model:
            file: {{ .Values.llamacpp.model.file | quote }}
            gpuLayers: {{ .Values.llamacpp.model.gpuLayers }}
            contextSize: {{ .Values.llamacpp.model.contextSize }}
            parallel: {{ .Values.llamacpp.model.parallel }}
            memoryLimit: {{ .Values.llamacpp.model.memoryLimit | quote }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
