# Defaults for standalone `helm template` rendering. In-cluster ArgoCD
# overrides these via the parent chart's valuesObject (see
# kubernetes-services/templates/supabase.yaml).
nfs:
  server: 192.168.1.3
  path: /bigdisk/k8s-cluster/supabase-dumps
cluster_domain: example.com
# Helm release name for the upstream supabase chart. The chart prefixes
# its Service objects with this name (e.g. <release>-supabase-kong).
supabase_release_name: supabase
