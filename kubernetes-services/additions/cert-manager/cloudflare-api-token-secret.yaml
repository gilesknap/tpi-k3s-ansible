# PLACEHOLDER — this file must be replaced with a real SealedSecret before cert-manager
# can issue certificates via DNS-01. Without it the ClusterIssuer will fail to complete
# ACME challenges.
#
# Prerequisites: sealed-secrets controller must be running in kube-system.
#
# Steps:
#   1. Create a Cloudflare API token with "Edit zone DNS" permission scoped to gkcluster.org.
#      (Cloudflare dashboard → My Profile → API Tokens → Create Token)
#   2. Run the following to create and seal the secret:
#
#      kubectl create secret generic cloudflare-api-token \
#        --namespace cert-manager \
#        --from-literal=api-token=<YOUR_CLOUDFLARE_API_TOKEN> \
#        --dry-run=client -o yaml | \
#        kubeseal --controller-namespace kube-system -o yaml > \
#        kubernetes-services/additions/cert-manager/cloudflare-api-token-secret.yaml
#
#   3. Commit and push. ArgoCD will decrypt and apply it automatically.
#      cert-manager will then be able to complete DNS-01 challenges for all hostnames.
