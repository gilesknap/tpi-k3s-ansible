apiVersion: batch/v1
kind: CronJob
metadata:
  name: supabase-storage-daily
  namespace: backups
spec:
  # 02:15 UTC daily — 15 min after supabase-db.
  schedule: "15 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          # Pinned to the node hosting supabase-storage's local PV.
          nodeSelector:
            kubernetes.io/hostname: {{ .Values.local_storage.supabase_storage.node }}
          containers:
            - name: tar
              image: alpine:3.23
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  apk add --no-cache tar gzip >/dev/null
                  stamp=$(date +%F_%H%M)
                  out="/backup/${stamp}.tar.gz"
                  tar -czf "${out}" -C /data .
                  ls -lh /backup
                  find /backup -maxdepth 1 -type f -name '*.tar.gz' -mtime +7 -delete
              volumeMounts:
                - name: data
                  mountPath: /data
                  readOnly: true
                - name: nfs
                  mountPath: /backup
                  subPath: backups/supabase-storage
          volumes:
            - name: data
              hostPath:
                path: {{ .Values.local_storage.supabase_storage.path }}
                type: Directory
            - name: nfs
              persistentVolumeClaim:
                claimName: k8s-cluster-nfs
