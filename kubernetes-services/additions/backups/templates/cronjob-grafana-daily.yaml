apiVersion: batch/v1
kind: CronJob
metadata:
  name: grafana-daily
  namespace: backups
spec:
  schedule: "45 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          # Pinned to the node hosting the grafana local PV.
          nodeSelector:
            kubernetes.io/hostname: {{ .Values.local_storage.grafana.node }}
          containers:
            - name: sqlite-backup
              image: alpine:3.23
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  apk add --no-cache sqlite tar gzip >/dev/null
                  stamp=$(date +%F_%H%M)
                  # Use sqlite3's online .backup for a consistent snapshot
                  # rather than copying grafana.db while it may be written.
                  sqlite3 /data/grafana.db ".backup /tmp/grafana.db"
                  tar -czf "/backup/${stamp}.tar.gz" \
                    -C /tmp grafana.db \
                    -C /data provisioning 2>/dev/null || \
                  tar -czf "/backup/${stamp}.tar.gz" -C /tmp grafana.db
                  ls -lh /backup
                  find /backup -maxdepth 1 -type f -name '*.tar.gz' -mtime +7 -delete
              volumeMounts:
                - name: data
                  mountPath: /data
                  readOnly: true
                - name: nfs
                  mountPath: /backup
                  subPath: backups/grafana
          volumes:
            - name: data
              hostPath:
                path: {{ .Values.local_storage.grafana.path }}
                type: Directory
            - name: nfs
              persistentVolumeClaim:
                claimName: k8s-cluster-nfs
