apiVersion: batch/v1
kind: CronJob
metadata:
  name: supabase-minio-weekly
  namespace: backups
spec:
  schedule: "30 3 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          nodeSelector:
            kubernetes.io/hostname: {{ .Values.local_storage.supabase_minio.node }}
          containers:
            - name: tar
              image: alpine:3.23
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  apk add --no-cache tar gzip >/dev/null
                  stamp=$(date +%F)
                  out="/backup/${stamp}.tar.gz"
                  tar -czf "${out}" -C /data .
                  ls -lh /backup
                  find /backup -maxdepth 1 -type f -name '*.tar.gz' -mtime +28 -delete
              volumeMounts:
                - name: data
                  mountPath: /data
                  readOnly: true
                - name: nfs
                  mountPath: /backup
                  subPath: backups/supabase-minio/weekly
          volumes:
            - name: data
              hostPath:
                path: {{ .Values.local_storage.supabase_minio.path }}
                type: Directory
            - name: nfs
              persistentVolumeClaim:
                claimName: k8s-cluster-nfs
