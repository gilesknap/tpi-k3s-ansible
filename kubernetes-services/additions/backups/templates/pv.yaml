apiVersion: v1
kind: PersistentVolume
metadata:
  name: k8s-cluster-nfs
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    namespace: backups
    name: k8s-cluster-nfs
  nfs:
    server: "{{ .Values.nfs.server }}"
    path: "{{ .Values.nfs.cluster_share_path }}"
  mountOptions:
    - vers=4.1
    - hard
