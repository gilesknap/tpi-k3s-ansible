---
apiVersion: v1
kind: ConfigMap
metadata:
  name: home-nginx-conf
  namespace: home
data:
  default.conf: |
    server {
      listen 8080;
      root /usr/share/nginx/html;
      index index.html;

      location = /healthz {
        return 200 'ok';
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: home-html
  namespace: home
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>{{ .Values.cluster_domain }} — Services</title>
      <link rel="icon" type="image/svg+xml" href="logo.svg">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          background: #1a1a2e;
          color: #e0e0e0;
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          align-items: center;
          padding: 2rem 1rem;
        }
        h1 {
          font-size: 1.8rem;
          font-weight: 300;
          margin-bottom: 2rem;
          color: #ffffff;
          letter-spacing: 0.05em;
        }
        .section-heading {
          font-weight: 300;
          margin: 2.5rem 0 1rem;
          color: #a0a0b8;
          font-size: 1.1rem;
          letter-spacing: 0.05em;
        }
        .grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
          gap: 1rem;
          max-width: 900px;
          width: 100%;
        }
        .card {
          display: block;
          background: #16213e;
          border: 1px solid #0f3460;
          border-radius: 8px;
          padding: 1.25rem;
          text-decoration: none;
          color: #e0e0e0;
          transition: background 0.2s, border-color 0.2s;
        }
        .card:hover {
          background: #1a2a50;
          border-color: #533483;
        }
        .card h2 {
          font-size: 1.1rem;
          font-weight: 600;
          margin-bottom: 0.4rem;
          color: #ffffff;
        }
        .card p {
          font-size: 0.85rem;
          color: #a0a0b8;
          line-height: 1.4;
        }
        .badge {
          display: inline-block;
          font-size: 0.65rem;
          font-weight: 600;
          padding: 0.15rem 0.4rem;
          border-radius: 4px;
          margin-left: 0.5rem;
          vertical-align: middle;
          text-transform: uppercase;
          letter-spacing: 0.03em;
        }
        .badge-oauth { background: #533483; color: #d8b4fe; }
        .badge-sso { background: #1e3a5f; color: #7dd3fc; }
        .badge-lan { background: #3a3a3a; color: #888; font-size: 0.6rem; }
        .card-lan.disabled {
          opacity: 0.45;
          pointer-events: none;
          cursor: default;
        }
        .card-lan.disabled h2 { color: #666; }
        .card-lan.disabled p { color: #444; }
        .lan-badge { display: none; }
        .card-lan.disabled .lan-badge { display: inline-block; }
        .footer {
          margin-top: 3rem;
          padding-top: 1.5rem;
          border-top: 1px solid #0f3460;
          max-width: 900px;
          width: 100%;
          display: flex;
          flex-wrap: wrap;
          justify-content: center;
          gap: 1.5rem;
          font-size: 0.8rem;
          color: #606080;
        }
        .footer a {
          color: #818cf8;
          text-decoration: none;
        }
        .footer a:hover { text-decoration: underline; }
      </style>
    </head>
    <body>
      <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:2rem">
        <img src="logo.svg" alt="logo" width="48" height="48">
        <h1 style="margin:0">{{ .Values.cluster_domain }}</h1>
      </div>
      <h2 class="section-heading">Kubernetes</h2>
      <div class="grid">
        <a class="card" href="https://argocd.{{ .Values.cluster_domain }}">
          <h2>ArgoCD<span class="badge badge-sso">SSO</span></h2>
          <p>GitOps continuous delivery dashboard</p>
        </a>
        <a class="card" href="https://headlamp.{{ .Values.cluster_domain }}">
          <h2>Headlamp<span class="badge badge-oauth">OAuth</span></h2>
          <p>Kubernetes cluster dashboard</p>
        </a>
        <a class="card" href="https://grafana.{{ .Values.cluster_domain }}">
          <h2>Grafana<span class="badge badge-sso">SSO</span></h2>
          <p>Monitoring and metrics visualization</p>
        </a>
        <a class="card" href="https://open-webui.{{ .Values.cluster_domain }}">
          <h2>Open WebUI<span class="badge badge-sso">SSO</span></h2>
          <p>LLM chat interface</p>
        </a>
        <a class="card card-lan" href="https://longhorn.{{ .Values.cluster_domain }}">
          <h2>Longhorn<span class="badge badge-oauth">OAuth</span><span class="badge badge-lan lan-badge">LAN only</span></h2>
          <p>Distributed block storage management</p>
        </a>
        <a class="card" href="https://supabase.{{ .Values.cluster_domain }}">
          <h2>Supabase Studio<span class="badge badge-oauth">OAuth</span></h2>
          <p>Database and backend management</p>
        </a>
        <a class="card" href="https://alertmanager.{{ .Values.cluster_domain }}">
          <h2>Alertmanager<span class="badge badge-oauth">OAuth</span></h2>
          <p>Alert routing and notification management</p>
        </a>
        <a class="card" href="https://argocd-monitor.{{ .Values.cluster_domain }}">
          <h2>ArgoCD Monitor<span class="badge badge-sso">SSO</span></h2>
          <p>Application health monitoring</p>
        </a>
      </div>
      <h2 class="section-heading">Network</h2>
      <div class="grid">
        <a class="card card-lan" href="http://192.168.1.1">
          <h2>OpenWRT<span class="badge badge-lan lan-badge">LAN only</span></h2>
          <p>Network router administration</p>
        </a>
        <a class="card card-lan" href="http://192.168.1.92:8096/web/#/home">
          <h2>JellyFin<span class="badge badge-lan lan-badge">LAN only</span></h2>
          <p>Media server</p>
        </a>
        <a class="card" href="https://login.tailscale.com/admin/machines">
          <h2>Tailscale</h2>
          <p>VPN mesh network admin</p>
        </a>
        <a class="card" href="https://one.dash.cloudflare.com/">
          <h2>Cloudflare</h2>
          <p>Zero Trust tunnels and access</p>
        </a>
      </div>
      <div class="footer">
        <span>K3s Cluster</span>
        <a href="https://gilesknap.github.io/tpi-k3s-ansible/">Docs</a>
        <a href="https://gilesknap.github.io/tpi-k3s-ansible/architecture.html">Architecture</a>
        <a href="{{ .Values.repo_remote | trimSuffix ".git" }}">GitHub</a>
      </div>
      <script>
        (function() {
          function disableLan() {
            document.querySelectorAll('.card-lan').forEach(function(el) {
              el.classList.add('disabled');
            });
          }
          // Probe Longhorn (LAN-only) to detect network. Fetch in no-cors
          // mode: resolves if TCP connects (on LAN), rejects otherwise.
          var ctrl = new AbortController();
          var timer = setTimeout(function() { ctrl.abort(); disableLan(); }, 3000);
          fetch('https://longhorn.{{ .Values.cluster_domain }}/', {mode:'no-cors', signal:ctrl.signal})
            .then(function() { clearTimeout(timer); })
            .catch(function() { clearTimeout(timer); disableLan(); });
        })();
      </script>
    </body>
    </html>
  logo.svg: |
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
      <defs>
        <radialGradient id="bg" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#a855f7"/>
          <stop offset="100%" stop-color="#1a1a2e"/>
        </radialGradient>
        <filter id="gl">
          <feGaussianBlur stdDeviation="1.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
      <g filter="url(#gl)" stroke="#818cf8" stroke-width="1.5" fill="none">
        <line x1="32" y1="32" x2="32" y2="10"/>
        <line x1="32" y1="32" x2="51" y2="21"/>
        <line x1="32" y1="32" x2="51" y2="43"/>
        <line x1="32" y1="32" x2="32" y2="54"/>
        <line x1="32" y1="32" x2="13" y2="43"/>
        <line x1="32" y1="32" x2="13" y2="21"/>
      </g>
      <g filter="url(#gl)">
        <circle cx="32" cy="32" r="5" fill="#c084fc"/>
        <circle cx="32" cy="10" r="3.5" fill="#38bdf8"/>
        <circle cx="51" cy="21" r="3.5" fill="#38bdf8"/>
        <circle cx="51" cy="43" r="3.5" fill="#38bdf8"/>
        <circle cx="32" cy="54" r="3.5" fill="#38bdf8"/>
        <circle cx="13" cy="43" r="3.5" fill="#38bdf8"/>
        <circle cx="13" cy="21" r="3.5" fill="#38bdf8"/>
      </g>
    </svg>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: home
  namespace: home
spec:
  replicas: 1
  selector:
    matchLabels:
      app: home
  template:
    metadata:
      labels:
        app: home
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.29-alpine
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
              readOnly: true
            - name: html
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: nginx-conf
          configMap:
            name: home-nginx-conf
        - name: html
          configMap:
            name: home-html
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: home
  namespace: home
spec:
  selector:
    app: home
  ports:
    - port: 80
      targetPort: 8080
