# Defaults for standalone `helm template` rendering. In-cluster ArgoCD
# overrides these via the parent chart's valuesObject (see
# kubernetes-services/templates/rkllama.yaml).
nfs:
  server: 192.168.1.3
  path: /bigdisk/k8s-cluster/models
# Single node the DaemonSet pins to (only one RK1 has enough RAM for
# the NPU model). Override in kubernetes-services/values.yaml.
node: node04
