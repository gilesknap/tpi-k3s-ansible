apiVersion: v1
kind: ConfigMap
metadata:
  name: rkllama-init-scripts
  namespace: rkllama
data:
  fix_frequency.sh: |
    #!/bin/sh
    # Set CPU governor to performance mode for optimal NPU-accelerated LLM inference.
    # Must run as root with access to /sys (hostPath or privileged).
    set -e

    echo "Setting CPU governors to performance..."
    for gov in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
      echo performance > "$gov" 2>/dev/null && echo "  $gov -> performance" || true
    done

    echo "Setting NPU/GPU devfreq governors to performance..."
    for gov in /sys/class/devfreq/*/governor; do
      echo performance > "$gov" 2>/dev/null && echo "  $gov -> performance" || true
    done

    echo "fix_frequency.sh complete."

  nginx.conf: |
    # Nginx sidecar — stubs missing Ollama endpoints that Open WebUI requires,
    # proxies everything else to rkllama on port 8080.
    events {}
    http {
      server {
        listen 8082;

        # /api/ps: rkllama doesn't implement this but Open WebUI polls it
        # to verify the connection. Return an empty but valid Ollama response.
        location = /api/ps {
          default_type application/json;
          return 200 '{"models":[]}';
        }

        # Everything else proxied transparently to rkllama.
        location / {
          proxy_pass http://localhost:8080;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          # Required for streaming (SSE) inference responses.
          proxy_buffering off;
          proxy_read_timeout 600s;
        }
      }
    }
