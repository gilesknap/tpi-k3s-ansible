apiVersion: v1
kind: Service
metadata:
  name: rkllama
  namespace: rkllama
  labels:
    app: rkllama
spec:
  # ClusterIP with all 3 RK1 DaemonSet pods as endpoints.
  # kube-proxy round-robbins requests across all ready pods → ~3× throughput.
  type: ClusterIP
  selector:
    app: rkllama
  ports:
    - name: http
      port: 8080
      targetPort: 8082
      protocol: TCP
