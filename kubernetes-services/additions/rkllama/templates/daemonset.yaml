apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: rkllama
  namespace: rkllama
  labels:
    app: rkllama
spec:
  selector:
    matchLabels:
      app: rkllama
  template:
    metadata:
      labels:
        app: rkllama
    spec:
      nodeSelector:
        node-type: rk1

      initContainers:
        - name: fix-frequency
          image: busybox:1.37
          command: ["/bin/sh", "/scripts/fix_frequency.sh"]
          securityContext:
            privileged: true
          volumeMounts:
            - name: init-scripts
              mountPath: /scripts
            - name: sys
              mountPath: /sys

      containers:
        - name: rkllama
          # OpenAI/Ollama-compatible LLM server backed by Rockchip RKLLM SDK (NPU-accelerated)
          # https://github.com/NotPunchnox/rkllama
          # Runs on port 8080 internally; nginx sidecar fronts on 8082.
          image: ghcr.io/notpunchnox/rkllama:main
          imagePullPolicy: Always
          ports:
            - name: rkllama
              containerPort: 8080
              protocol: TCP
          env:
            - name: MODELS_DIR
              value: /root/RKLLAMA/models
          securityContext:
            privileged: true # required for /dev/rknpu NPU access
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "14Gi" # RK1 has 16GB; leave headroom for OS
          volumeMounts:
            - name: models
              mountPath: /root/RKLLAMA/models
            - name: rknpu
              mountPath: /dev/rknpu
          startupProbe:
            httpGet:
              path: /
              port: 8080
            # Allow up to 5 minutes for model loading (30 x 10s)
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 10

        - name: nginx
          # Sidecar: stubs /api/ps; proxies everything else to rkllama on 8080.
          image: nginx:1.29-alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
          volumeMounts:
            - name: init-scripts
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          livenessProbe:
            httpGet:
              path: /api/version
              port: 8082
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/version
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10

      volumes:
        - name: init-scripts
          configMap:
            name: rkllama-init-scripts
            defaultMode: 0755
        - name: sys
          hostPath:
            path: /sys
        - name: models
          persistentVolumeClaim:
            claimName: rkllama-models
        - name: rknpu
          hostPath:
            path: /dev/rknpu
