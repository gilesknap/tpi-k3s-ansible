apiVersion: v1
kind: ConfigMap
metadata:
  name: rkllama-init-scripts
  namespace: rkllama
data:
  fix_frequency.sh: |
    #!/bin/sh
    # Set CPU governor to performance mode for optimal NPU-accelerated LLM inference.
    # Must run as root with access to /sys (hostPath or privileged).
    set -e

    echo "Setting CPU governors to performance..."
    for gov in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
      echo performance > "$gov" 2>/dev/null && echo "  $gov -> performance" || true
    done

    echo "Setting NPU/GPU devfreq governors to performance..."
    for gov in /sys/class/devfreq/*/governor; do
      echo performance > "$gov" 2>/dev/null && echo "  $gov -> performance" || true
    done

    echo "fix_frequency.sh complete."
