apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth2-proxy-error-templates
  namespace: oauth2-proxy
data:
  error.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Access Denied</title>
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          background: #1a1a2e;
          color: #e0e0e0;
          min-height: 100vh;
          display: flex;
          justify-content: center;
          align-items: center;
          padding: 2rem 1rem;
        }
        .container {
          text-align: center;
          max-width: 480px;
        }
        .icon {
          font-size: 4rem;
          margin-bottom: 1.5rem;
          opacity: 0.7;
        }
        h1 {
          font-size: 1.8rem;
          font-weight: 300;
          color: #ffffff;
          letter-spacing: 0.05em;
          margin-bottom: 1rem;
        }
        .message {
          font-size: 1rem;
          color: #a0a0b8;
          line-height: 1.6;
          margin-bottom: 2rem;
        }
        .card {
          background: #16213e;
          border: 1px solid #0f3460;
          border-radius: 8px;
          padding: 1.25rem;
          margin-bottom: 1.5rem;
        }
        .card p {
          font-size: 0.85rem;
          color: #a0a0b8;
          line-height: 1.4;
        }
        .code {
          display: inline-block;
          background: #16213e;
          border: 1px solid #0f3460;
          border-radius: 4px;
          padding: 0.2rem 0.6rem;
          font-family: monospace;
          font-size: 0.9rem;
          color: #818cf8;
        }
        a {
          color: #38bdf8;
          text-decoration: none;
          transition: color 0.2s;
        }
        a:hover {
          color: #818cf8;
        }
      </style>
    </head>
    <body>
      <div class="container">
        <div class="icon">&#x1f512;</div>
        <h1>Access Denied</h1>
        <div class="card">
          <p>
            This service is restricted to cluster administrators.
            If you believe you should have access, contact the cluster admin.
          </p>
        </div>
        <p class="message">
          <span class="code">{{.StatusCode}}</span>
        </p>
        <a href="javascript:history.back()">&#8592; Go back</a>
      </div>
    </body>
    </html>
