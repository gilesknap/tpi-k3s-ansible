# Cloudflare tunnel parameters.
# Chart docs: https://github.com/cloudflare/helm-charts/tree/main/charts/cloudflared
cloudflare:
  # Your Cloudflare account email.
  account: Gilesknap@gmail.com
  # The name of the tunnel this instance will serve.
  tunnelName: gk2
  # The ID of the above tunnel (from `cloudflared tunnel info gk2`).
  tunnelId: b685ab53-4600-4a7f-86ee-6b6ae73a39e6
  # Reference the SealedSecret (see additions/cloudflared/tunnel-secret.yaml).
  # The secret must have key TUNNEL_TOKEN or credentials.json depending on chart version.
  # Create with:
  #   kubectl create secret generic cloudflared-credentials \
  #     --namespace cloudflared \
  #     --from-literal=TUNNEL_TOKEN=<token> \
  #     --dry-run=client -o yaml | \
  #     kubeseal --controller-namespace kube-system -o yaml > \
  #     kubernetes-services/additions/cloudflared/tunnel-secret.yaml
  secretName: cloudflared-credentials
  # If true, turn on WARP routing for TCP.
  enableWarp: false
  # Ingress rules: route each public hostname to the NGINX ingress controller.
  # NGINX then handles TLS termination and routes based on Host header.
  # noTLSVerify is needed because the internal cert is signed for the external hostname.
  #
  # Only the echo test service is exposed publicly via the tunnel.
  # All other services (argocd, headlamp, longhorn, grafana) are LAN-only —
  # they are NOT listed here and return 404 from the catch-all for external requests.
  # Access those services via your router's local DNS pointing *.gkcluster.org → 192.168.1.81.
  ingress:
    - hostname: echo.gkcluster.org
      service: https://ingress-nginx-controller.ingress-nginx.svc.cluster.local:443
      originRequest:
        noTLSVerify: true
    # Catch-all must be last.
    - service: http_status:404
