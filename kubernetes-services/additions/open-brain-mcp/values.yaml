# Defaults for standalone `helm template` rendering. In-cluster ArgoCD
# overrides these via the parent chart's valuesObject (see
# kubernetes-services/templates/open-brain-mcp.yaml).
image:
  repository: ghcr.io/gilesknap/open-brain-mcp
  tag: latest
github_allowed_users: "gilesknap"
server_url: "https://brain.gkcluster.org"
# Helm release name for the upstream supabase chart. Used to derive
# the in-cluster Kong service URL.
supabase_release_name: supabase
