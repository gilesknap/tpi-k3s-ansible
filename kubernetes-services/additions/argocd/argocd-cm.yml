apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
data:
  url: https://argocd.gkcluster.org

  # Dex provides OIDC bridging for GitHub (GitHub is not a native OIDC
  # provider). The GitHub OAuth App callback URL must be set to:
  #   https://argocd.gkcluster.org/api/dex/callback
  # Dex reads clientID and clientSecret from argocd-secret (keys
  # dex.github.clientID and dex.github.clientSecret).
  # See docs/how-to/unified-auth.md for setup instructions.
  dex.config: |
    connectors:
      - type: github
        id: github
        name: GitHub
        config:
          clientID: $dex.github.clientID
          clientSecret: $dex.github.clientSecret

  resource.customizations: |
    monitoring.coreos.com/Prometheus:
      health.lua: |
        if obj.metadata.annotations ~= nil and obj.metadata.annotations["argocd.argoproj.io/skip-health-check"] ~= nil then
          hs = {}
          hs.status = "Healthy"
          hs.message = "Ignoring Prometheus Health Check"
          return hs
        end

        hs={ status = "Progressing", message = "Waiting for initialization" }
        if obj.status ~= nil then
          if obj.status.conditions ~= nil then
            for i, condition in ipairs(obj.status.conditions) do

              if condition.type == "Available" and condition.status ~= "True" then
                if condition.reason == "SomePodsNotReady" then
                  hs.status = "Progressing"
                else
                  hs.status = "Degraded"
                end
                hs.message = condition.message or condition.reason
              end
              if condition.type == "Available" and condition.status == "True" then
                hs.status = "Healthy"
                hs.message = "All instances are available"
              end
            end
          end
        end
        return hs
  resource.customizations.useOpenLibs.monitoring.coreos.com_Prometheus: "true"
