apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
data:
  # Map GitHub emails to ArgoCD roles.
  # Add "g, user@example.com, role:admin" lines for each admin user.
  # Everyone else who authenticates via Dex gets the default role.
  # See https://argo-cd.readthedocs.io/en/stable/operator-manual/rbac/
  policy.csv: |
    g, gilesknap@gmail.com, role:admin
  policy.default: role:readonly
