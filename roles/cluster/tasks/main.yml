# perform any final cluster setup first

- name: Taint the control plane node to keep workloads off
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Node
      metadata:
        name: "{{ control_plane }}"
      spec:
        taints:
          - key: node-role.kubernetes.io/master
            effect: NoSchedule
  when: groups['all_nodes'] | length > 1


# install services - only ArgoCD for now - it adds everything else

- name: Cluster Install of services
  ansible.builtin.include_tasks: "{{ cluster_service }}.yml"
  loop: "{{  cluster_install_list }}"
  when: cluster_install_list is defined
  loop_control:
    loop_var: cluster_service

# kube-prometheus-stack's webhook TLS secret is normally created by a Helm
# hook job, but ArgoCD prunes hook jobs so the secret never appears.
# Create a self-signed cert and apply idempotently. (#6 rebuild checklist)
- name: Create Prometheus admission webhook TLS secret
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      TMPDIR=$(mktemp -d)
      trap 'rm -rf "$TMPDIR"' EXIT
      openssl req -x509 -newkey rsa:2048 \
          -keyout "$TMPDIR/key.pem" -out "$TMPDIR/cert.pem" \
          -days 365 -nodes \
          -subj '/CN=grafana-prometheus-kube-pr-admission.monitoring.svc' 2>/dev/null
      kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -
      kubectl create secret generic grafana-prometheus-kube-pr-admission \
          -n monitoring \
          --from-file=cert="$TMPDIR/cert.pem" \
          --from-file=key="$TMPDIR/key.pem" \
          --from-file=ca="$TMPDIR/cert.pem" \
          --dry-run=client -o yaml | kubectl apply -f -
    executable: /bin/bash
  changed_when: true
