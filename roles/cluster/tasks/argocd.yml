# Setup ArgoCD to deploy the services defined in /kubernetes-services

- name: Install the helm chart for ArgoCD
  kubernetes.core.helm:
    chart_ref: oci://ghcr.io/argoproj/argo-helm/argo-cd
    chart_version: 9.4.17
    release_name: argocd
    namespace: argo-cd
    create_namespace: true
    values:
      global:
        domain: argocd.{{ cluster_domain }}
      configs:
        params:
          server.insecure: "true"

- name: Read ArgoCD server.secretkey for Dex client secret computation
  ansible.builtin.shell:
    cmd: kubectl get secret argocd-secret -n argo-cd -o 'jsonpath={.data.server\.secretkey}'
    executable: /bin/bash
  register: _server_secretkey_b64
  changed_when: false

# ArgoCD auto-generates a Dex `argo-cd` static client with a secret derived
# from server.secretkey: SHA256(base64_string) → base64url[:40].
# Our dex.config re-declares this client (to add trustedPeers), so the secret
# must match exactly or OAuth callbacks fail with "invalid_client".
- name: Compute Dex argo-cd client secret
  ansible.builtin.command:
    cmd: >-
      python3 -c "import hashlib,base64,sys;
      k=base64.b64decode(sys.argv[1]).decode();
      print(base64.urlsafe_b64encode(hashlib.sha256(k.encode()).digest()).decode()[:40])"
      "{{ _server_secretkey_b64.stdout }}"
  register: _dex_secret_cmd
  changed_when: false

- name: Set Dex client secret fact
  ansible.builtin.set_fact:
    _argocd_dex_client_secret: "{{ _dex_secret_cmd.stdout }}"

- name: Patch the ArgoCD ConfigMap
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'kubernetes-services/additions/argocd/argocd-cm.yml') }}"
    namespace: argo-cd
  register: argocd_cm

- name: Remove oidc.config from argocd-cm (incompatible with Dex)
  kubernetes.core.k8s_json_patch:
    kind: ConfigMap
    name: argocd-cm
    namespace: argo-cd
    patch:
      - op: remove
        path: /data/oidc.config
  register: remove_oidc
  failed_when: false
  changed_when: remove_oidc.result is defined

- name: Apply ArgoCD RBAC ConfigMap
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'kubernetes-services/additions/argocd/argocd-rbac-cm.yml') }}"
    namespace: argo-cd
  register: argocd_rbac_cm

- name: Rollout restart ArgoCD if config changed # noqa no-handler
  ansible.builtin.command: >
    kubectl rollout restart -n argo-cd statefulset argocd-application-controller
  when: argocd_cm.changed or argocd_rbac_cm.changed or (remove_oidc.changed | default(false))
  changed_when: true

- name: Rollout restart Dex server if config changed # noqa no-handler
  ansible.builtin.command: >
    kubectl rollout restart -n argo-cd deployment argocd-dex-server
  when: argocd_cm.changed or (remove_oidc.changed | default(false))
  changed_when: true

- name: Add an ArgoCD Project for the cluster
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'argo-cd/argo-project.yaml') }}"

- name: Add the Git Repo for the aboved project to track
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'argo-cd/argo-git-repository.yaml') }}"

- name: Add an ingress for ArgoCD
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'argo-cd/ingress.yaml') }}"
    namespace: argo-cd

# Wait for sealed-secrets controller before applying SealedSecret resources.
# The root Application (above) triggers ArgoCD to sync the sealed-secrets
# child app, which installs the CRD and controller. Without this wait,
# SealedSecret resources fail because the CRD does not exist yet. (#247)
- name: Wait for sealed-secrets controller to be ready
  kubernetes.core.k8s_info:
    kind: Deployment
    name: sealed-secrets
    namespace: kube-system
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 300

- name: Check for ArgoCD Dex sealed secret file
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/kubernetes-services/additions/argocd/argocd-dex-secret.yaml"
  register: dex_secret_file

- name: Apply ArgoCD Dex sealed secret
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('file', playbook_dir ~ '/kubernetes-services/additions/argocd/argocd-dex-secret.yaml') | from_yaml }}"
  when: dex_secret_file.stat.exists

# ArgoCD requires this label for $secret:key resolution in dex.config.
# SealedSecrets may not propagate it, so ensure it after the secret exists.
- name: Label argocd-dex-secret for ArgoCD secret resolution
  ansible.builtin.command:
    cmd: >-
      kubectl label secret argocd-dex-secret -n argo-cd
      app.kubernetes.io/part-of=argocd --overwrite
  changed_when: true
  failed_when: false
