# Setup ArgoCD to deploy the services defined in /kubernetes-services

- name: Install the helm chart for ArgoCD (minimal, creates argocd-secret)
  kubernetes.core.helm:
    chart_ref: oci://ghcr.io/argoproj/argo-helm/argo-cd
    chart_version: 9.4.17
    release_name: argocd
    namespace: argo-cd
    create_namespace: true
    values:
      global:
        domain: argocd.{{ cluster_domain }}
      configs:
        params:
          server.insecure: "true"

# ArgoCD auto-generates a Dex `argo-cd` static client with a secret derived
# from server.secretkey. Our dex.config re-declares this client (to add
# trustedPeers), so the secret must match exactly or OAuth callbacks fail
# with "invalid_client". Delegate to the script so the derivation lives in
# one place (see scripts/derive-argocd-client-secret).
#
# On a fresh bootstrap, `helm install` above creates `argocd-secret` with
# only `admin.password` — the argocd-server pod patches in
# `server.secretkey` a few seconds later when it starts up. Retry the
# derivation until the script stops failing (fail-fast on empty input),
# otherwise we'd silently render the empty-hash
# `47DEQpj8HBSa-_TImW-5JCeuQeRkm5NMpJWZG3hS` into the configmap.
- name: Derive Dex argo-cd client secret
  ansible.builtin.command:
    cmd: scripts/derive-argocd-client-secret
    chdir: "{{ playbook_dir }}"
  register: _dex_secret_cmd
  changed_when: false
  retries: 30
  delay: 2
  until: _dex_secret_cmd.rc == 0

- name: Set Dex client secret fact
  ansible.builtin.set_fact:
    _argocd_dex_client_secret: "{{ _dex_secret_cmd.stdout }}"

- name: Upgrade ArgoCD Helm release with full configuration
  kubernetes.core.helm:
    chart_ref: oci://ghcr.io/argoproj/argo-helm/argo-cd
    chart_version: 9.4.17
    release_name: argocd
    namespace: argo-cd
    values:
      global:
        domain: argocd.{{ cluster_domain }}
      configs:
        params:
          server.insecure: "true"
        cm:
          url: "https://argocd.{{ cluster_domain }}"
          admin.enabled: "false"
          oidc.config: |
            name: Dex
            issuer: https://argocd.{{ cluster_domain }}/api/dex
            clientID: argo-cd
            clientSecret: {{ _argocd_dex_client_secret }}
            allowedAudiences:
              - argo-cd
              - argocd-monitor
            requestedScopes:
              - openid
              - profile
              - email
          dex.config: |
            connectors:
              - type: github
                id: github
                name: GitHub
                config:
                  clientID: $argocd-dex-secret:dex.github.clientID
                  clientSecret: $argocd-dex-secret:dex.github.clientSecret
                  loadAllGroups: true
            staticClients:
              - id: argo-cd
                name: Argo CD
                redirectURIs:
                  - https://argocd.{{ cluster_domain }}/auth/callback
                secret: {{ _argocd_dex_client_secret }}
                trustedPeers:
                  - argocd-monitor
              - id: argocd-monitor
                name: ArgoCD Monitor
                redirectURIs:
                  - https://argocd-monitor.{{ cluster_domain }}/oauth2/callback
                secret: $argocd-dex-secret:argocd-monitor.clientSecret
              - id: grafana
                name: Grafana
                redirectURIs:
                  - https://grafana.{{ cluster_domain }}/login/generic_oauth
                secret: $argocd-dex-secret:grafana.clientSecret
              - id: open-webui
                name: Open WebUI
                redirectURIs:
                  - https://open-webui.{{ cluster_domain }}/oauth/oidc/callback
                  - http://open-webui.{{ cluster_domain }}/oauth/oidc/callback
                secret: $argocd-dex-secret:open-webui.clientSecret
          resource.customizations: |
            monitoring.coreos.com/Prometheus:
              health.lua: |
                if obj.metadata.annotations ~= nil and obj.metadata.annotations["argocd.argoproj.io/skip-health-check"] ~= nil then
                  hs = {}
                  hs.status = "Healthy"
                  hs.message = "Ignoring Prometheus Health Check"
                  return hs
                end

                hs={ status = "Progressing", message = "Waiting for initialization" }
                if obj.status ~= nil then
                  if obj.status.conditions ~= nil then
                    for i, condition in ipairs(obj.status.conditions) do

                      if condition.type == "Available" and condition.status ~= "True" then
                        if condition.reason == "SomePodsNotReady" then
                          hs.status = "Progressing"
                        else
                          hs.status = "Degraded"
                        end
                        hs.message = condition.message or condition.reason
                      end
                      if condition.type == "Available" and condition.status == "True" then
                        hs.status = "Healthy"
                        hs.message = "All instances are available"
                      end
                    end
                  end
                end
                return hs
          resource.customizations.useOpenLibs.monitoring.coreos.com_Prometheus: "true"
        rbac:
          policy.default: role:readonly
          scopes: '[email]'
          policy.csv: |
            p, role:admin, applications, *, */*, allow
            p, role:admin, applications, update/*, */*, allow
            p, role:admin, applications, delete/*, */*, allow
            p, role:admin, logs, get, */*, allow
            p, role:admin, exec, create, */*, allow
            p, role:readonly, logs, get, */*, allow
            {% for email in admin_emails %}
            g, {{ email }}, role:admin
            {% endfor %}
  register: argocd_helm_upgrade

- name: Rollout restart ArgoCD if config changed # noqa no-handler
  ansible.builtin.command: >
    kubectl rollout restart -n argo-cd statefulset argocd-application-controller
  when: argocd_helm_upgrade.changed
  changed_when: true

- name: Rollout restart Dex server if config changed # noqa no-handler
  ansible.builtin.command: >
    kubectl rollout restart -n argo-cd deployment argocd-dex-server
  when: argocd_helm_upgrade.changed
  changed_when: true

- name: Add an ArgoCD Project for the cluster
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'argo-cd/argo-project.yaml') }}"

- name: Add an ingress for ArgoCD
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'argo-cd/ingress.yaml') }}"
    namespace: argo-cd

# Install sealed-secrets directly so kubeseal has a controller to talk
# to *before* the root Application fans out child syncs. Without this,
# the fastest child app (cert-manager today) applies stale SealedSecret
# resources from the prior cluster that the new controller cannot
# decrypt. The root Application also includes this Application via
# app-of-apps; the tracking-id annotation lets ArgoCD adopt this
# resource cleanly when the root later syncs.
- name: Bootstrap sealed-secrets Application standalone
  kubernetes.core.k8s:
    state: present
    definition: >-
      {{ (lookup('file', playbook_dir
         ~ '/kubernetes-services/templates/sealed-secrets.yaml')
         | from_yaml)
         | combine({
             'metadata': {
               'annotations': {
                 'argocd.argoproj.io/tracking-id':
                   'all-cluster-services:argoproj.io/Application:argo-cd/sealed-secrets'
               }
             }
           }, recursive=True) }}

# Wait for sealed-secrets controller before applying SealedSecret resources.
# Without this wait, SealedSecret resources fail because the CRD does
# not exist yet. (#247)
- name: Wait for sealed-secrets controller to be ready
  kubernetes.core.k8s_info:
    kind: Deployment
    name: sealed-secrets
    namespace: kube-system
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 300

# When GENERATE_SECRETS=true, generate fresh secrets, seal them, commit, and
# push — all in one playbook run. This eliminates the manual extract→seal→
# second-run cycle during cluster rebuild. External credentials must be
# provided as env vars (GITHUB_CLIENT_ID, CLOUDFLARE_API_TOKEN, etc.).
- name: Generate and seal all secrets for rebuild
  ansible.builtin.shell:
    cmd: just generate-and-seal-all
    chdir: "{{ playbook_dir }}"
    executable: /bin/bash
  environment:
    GITHUB_CLIENT_ID: "{{ lookup('ansible.builtin.env', 'GITHUB_CLIENT_ID') }}"
    GITHUB_CLIENT_SECRET: "{{ lookup('ansible.builtin.env', 'GITHUB_CLIENT_SECRET') }}"
    CLOUDFLARE_API_TOKEN: "{{ lookup('ansible.builtin.env', 'CLOUDFLARE_API_TOKEN') }}"
    CLOUDFLARE_TUNNEL_TOKEN: "{{ lookup('ansible.builtin.env', 'CLOUDFLARE_TUNNEL_TOKEN') }}"
    OAUTH2_PROXY_CLIENT_ID: "{{ lookup('ansible.builtin.env', 'OAUTH2_PROXY_CLIENT_ID') }}"
    OAUTH2_PROXY_CLIENT_SECRET: "{{ lookup('ansible.builtin.env', 'OAUTH2_PROXY_CLIENT_SECRET') }}"
    OPEN_BRAIN_GITHUB_CLIENT_ID: "{{ lookup('ansible.builtin.env', 'OPEN_BRAIN_GITHUB_CLIENT_ID') }}"
    OPEN_BRAIN_GITHUB_CLIENT_SECRET: "{{ lookup('ansible.builtin.env', 'OPEN_BRAIN_GITHUB_CLIENT_SECRET') }}"
    ADMIN_PASSWORD: "{{ lookup('ansible.builtin.env', 'ADMIN_PASSWORD', default='') }}"
    SUPABASE_PASSWORD: "{{ lookup('ansible.builtin.env', 'SUPABASE_PASSWORD', default='') }}"
    SUPABASE_JWT_SECRET: "{{ lookup('ansible.builtin.env', 'SUPABASE_JWT_SECRET', default='') }}"
    SLACK_WEBHOOK_URL: "{{ lookup('ansible.builtin.env', 'SLACK_WEBHOOK_URL', default='') }}"
    SMTP_USERNAME: "{{ lookup('ansible.builtin.env', 'SMTP_USERNAME', default='') }}"
    SMTP_PASSWORD: "{{ lookup('ansible.builtin.env', 'SMTP_PASSWORD', default='') }}"
    OPENAI_API_KEY: "{{ lookup('ansible.builtin.env', 'OPENAI_API_KEY', default='') }}"
  when: lookup('ansible.builtin.env', 'GENERATE_SECRETS') | default('') | lower == 'true'
  changed_when: true

- name: Commit and push sealed secrets for rebuild
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      cd "{{ playbook_dir }}"
      git add kubernetes-services/additions/
      if git diff --cached --quiet; then
        echo "No changes to commit"
      else
        uv run git commit -m "Re-seal all secrets for rebuilt cluster"
        git push
      fi
    executable: /bin/bash
  when: lookup('ansible.builtin.env', 'GENERATE_SECRETS') | default('') | lower == 'true'
  changed_when: true

# Create the root Application *after* secrets have been sealed and
# pushed, so all child app syncs see the freshly-pushed secrets. If
# the root is created before this point, the fastest-syncing child
# app (cert-manager today) races ahead and applies prior-cluster stale
# SealedSecret resources that the new controller cannot decrypt.
- name: Add the Git Repo for the aboved project to track
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'argo-cd/argo-git-repository.yaml') }}"

- name: Check for ArgoCD Dex sealed secret file
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/kubernetes-services/additions/argocd/argocd-dex-secret.yaml"
  register: dex_secret_file

- name: Apply ArgoCD Dex sealed secret
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('file', playbook_dir ~ '/kubernetes-services/additions/argocd/argocd-dex-secret.yaml') | from_yaml }}"
  when: dex_secret_file.stat.exists

# ArgoCD requires this label for $secret:key resolution in dex.config.
# SealedSecrets may not propagate it, so ensure it after the secret exists.
- name: Label argocd-dex-secret for ArgoCD secret resolution
  ansible.builtin.command:
    cmd: >-
      kubectl label secret argocd-dex-secret -n argo-cd
      app.kubernetes.io/part-of=argocd --overwrite
  changed_when: true
  failed_when: false
