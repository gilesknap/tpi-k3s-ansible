# Setup ArgoCD to deploy the services defined in /kubernetes-services
#
# Ansible bootstraps ArgoCD and the root Application only. Post-bootstrap
# config (ingress, ConfigMap, RBAC) is managed by ArgoCD itself via the
# argocd-config Application in kubernetes-services/templates/.

- name: Install the helm chart for ArgoCD
  kubernetes.core.helm:
    chart_ref: oci://ghcr.io/argoproj/argo-helm/argo-cd
    chart_version: 7.8.3
    release_name: argocd
    namespace: argo-cd
    create_namespace: true
    values:
      configs:
        params:
          # Let nginx terminate TLS so ArgoCD can sit behind oauth2-proxy
          # and the Cloudflare tunnel. See ADR 0002.
          server.insecure: true

- name: Add an ArgoCD Project for the cluster
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'argo-cd/argo-project.yaml') }}"

- name: Add the Git Repo for the above project to track
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'argo-cd/argo-git-repository.yaml') }}"

# How to access
#
# kubectl port-forward service/argocd-server -n argo-cd 8080:80
# Then open http://localhost:8080 in the browser.
#
# Login with username: admin and the password from:
# kubectl -n argo-cd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d
#
# (Delete the initial secret afterwards as suggested by the Getting Started
# Guide: https://argo-cd.readthedocs.io/en/stable/getting_started/#4-login-using-the-cli)
