# determine if the node already can accept ssh connections in
- name: Wait for {{ node_name }}
  delegate_to: localhost
  ansible.builtin.wait_for:
    host: "{{ node_name }}"
    port: 22
    timeout: 4
  register: flash_node_connect
  failed_when: false

- name: Report Node Status for {{ node_name }}
  ansible.builtin.debug:
    var: flash_node_connect

- name: Set Node Status
  ansible.builtin.set_fact:
    flash_node_status: "{{ not flash_node_connect is search('Timeout') | bool }}"
