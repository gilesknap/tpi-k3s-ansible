# Flash an image onto one of the turingpi nodes
#
# commands are delegated to localhost or use 'raw'
# because the BMC has no python or disk space to install python
# such commands cannot have ansible do idempotent checks, so suppress no-changed-when

- name: Select The Image To Flash For Rk1
  ansible.builtin.set_fact:
    flash_image: "{{ flash_image_info.rk1 }}"
  when: flash_node.type == 'rk1'

- name: Select The Image To Flash For Rpi4 Compute Module
  ansible.builtin.set_fact:
    flash_image: "{{ flash_image_info.pi4 }}"
  when: flash_node.type == 'pi4'

- name: Check for existing image file
  ansible.builtin.raw: mkdir -p {{ tpi_images_path }} && test -f {{ flash_image.osf_remote }}
  register: flash_os_file_stat
  ignore_errors: true
  changed_when: false

- name: Create Temporary Download Directory {{ flash_local_tmp }}
  delegate_to: localhost
  ansible.builtin.file:
    path: "{{ flash_local_tmp }}"
    state: directory
    mode: "0755"

- name: Get OS image for {{ flash_node.type }}
  delegate_to: localhost
  ansible.builtin.get_url:
    url: "{{ flash_image.url }}"
    dest: "{{ flash_image.os_file }}"
    mode: "0644"
  register: flash_os_file
  when: flash_os_file_stat.rc | default(0) != 0

- name: Scp image to BMC
  delegate_to: localhost
  ansible.builtin.command: |-
    scp {{ flash_image.os_file }}
    {{ tpi_user }}@{{ inventory_hostname }}:{{ flash_image.osf_remote }}
  changed_when: true
  when: flash_os_file_stat.rc | default(0) != 0

# this guarantees the state of the node and tpi flash will automatically turn in on
- name: Turn off {{ node_name }}
  ansible.builtin.raw: tpi power off -n {{ flash_node.slot_num }}
  changed_when: true

- name: Wait for node to fully power down before flashing {{ node_name }}
  ansible.builtin.pause:
    seconds: 10

- name: Flash image to {{ node_name }}
  # async+poll prints a status line every 15s so you can see it isn't hung.
  # Note: async is incompatible with retries/until; those are removed here.
  # If tpi flash fails with a USB enumeration error, power-cycle the BMC and re-run.
  ansible.builtin.raw: >-
    tpi power off -n {{ flash_node.slot_num }} &&
    sleep 15 &&
    tpi flash -n {{ flash_node.slot_num }} --image-path {{ flash_image.osf_remote }} --sha256 {{ flash_image.sha }}
  register: flash_results
  changed_when: true
  failed_when: flash_results.rc != 0 or 'Error occured' in (flash_results.stdout | default(''))
  async: 600
  poll: 15
  # use pre_flashed to skip this step when testing bootstrapping
  when: not flash_pre_flashed

- name: Show flash results
  ansible.builtin.debug:
    var: flash_results
