- name: Repair package manager
  ansible.builtin.command: sudo dpkg --configure -a
  changed_when: false

- name: Perform a dist-upgrade
  ansible.builtin.apt:
    upgrade: dist
    update_cache: true

- name: Check if a reboot is required
  ansible.builtin.stat:
    path: /var/run/reboot-required
    get_checksum: false
  register: reboot_required_file

- name: Reboot the server (if required)
  ansible.builtin.reboot:
  when:
    - reboot_required_file.stat.exists
    - not (workstation | default(false))

- name: Warn that workstation node requires a manual reboot
  ansible.builtin.debug:
    msg: >-
      WARNING: {{ inventory_hostname }} needs a reboot but is marked as a
      workstation. Reboot it manually when convenient.
  when:
    - reboot_required_file.stat.exists
    - workstation | default(false)

- name: Remove dependencies that are no longer required
  ansible.builtin.apt:
    autoremove: true

- name: Update apt and install required system packages
  ansible.builtin.apt:
    pkg:
      - unattended-upgrades
      - original-awk
      - nfs-common   # required for static NFS PVs (rkllama, llamacpp, supabase-db-dump, k8s-cluster backups)
      - linux-tools-generic  # provides usbip userspace tools
    update_cache: false

- name: Load vhci-hcd kernel module
  community.general.modprobe:
    name: vhci_hcd
    state: present

- name: Persist vhci-hcd module across reboots
  ansible.builtin.copy:
    content: "vhci_hcd\n"
    dest: /etc/modules-load.d/vhci_hcd.conf
    mode: "0644"

# NVIDIA container toolkit — only installed on nodes with nvidia_gpu_node: true in inventory.
# Required so that containerd can pass GPU devices into pods requesting nvidia.com/gpu.
# Set nvidia_gpu_node: true in host_vars/<nodename>.yml for each GPU node.

- name: Install ubuntu-drivers-common (provides ubuntu-drivers auto-install)
  ansible.builtin.apt:
    pkg:
      - ubuntu-drivers-common
    update_cache: false
  when: nvidia_gpu_node | default(false)

- name: Install NVIDIA GPU driver via ubuntu-drivers
  ansible.builtin.command: ubuntu-drivers install
  args:
    creates: /usr/bin/nvidia-smi  # skip if driver already installed
  when: nvidia_gpu_node | default(false)
  notify: Reboot node

- name: Add NVIDIA container toolkit GPG key
  ansible.builtin.shell:
    cmd: >
      curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey
      | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
    creates: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
  when: nvidia_gpu_node | default(false)

- name: Add NVIDIA container toolkit apt repository
  ansible.builtin.shell:
    cmd: >
      curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list
      | sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g'
      | tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
    creates: /etc/apt/sources.list.d/nvidia-container-toolkit.list
  when: nvidia_gpu_node | default(false)

- name: Install NVIDIA container toolkit
  ansible.builtin.apt:
    pkg:
      - nvidia-container-toolkit
    update_cache: true
  when: nvidia_gpu_node | default(false)

# k3s regenerates /var/lib/rancher/k3s/agent/etc/containerd/config.toml on every
# restart from its internal template, so nvidia-ctk changes to config.toml are
# lost. k3s supports a config.toml.tmpl override: if this file exists, k3s uses
# it as a Go template (with {{ template "base" . }} expanding the k3s defaults)
# to generate config.toml. Write the NVIDIA runtime config here so it survives
# k3s-agent restarts.
- name: Ensure k3s containerd config directory exists
  ansible.builtin.file:
    path: /var/lib/rancher/k3s/agent/etc/containerd
    state: directory
    mode: "0755"
  when: nvidia_gpu_node | default(false)

- name: Write k3s containerd config template with NVIDIA runtime as default
  ansible.builtin.copy:
    src: k3s-containerd-nvidia.toml.tmpl
    dest: /var/lib/rancher/k3s/agent/etc/containerd/config.toml.tmpl
    mode: "0644"
  when: nvidia_gpu_node | default(false)
  notify: Restart k3s-agent
