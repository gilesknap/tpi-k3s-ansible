# Install a k3s worker node

- name: Get the control plane facts
  ansible.builtin.setup:
    filter: ansible_default_ipv4
  delegate_to: "{{ control_plane }}"
  delegate_facts: true

- name: Wait for /var/lib/rancher/k3s/server/node-token
  ansible.builtin.wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    state: present
  delegate_to: "{{ control_plane }}"

- name: List nodes in the cluster
  ansible.builtin.command:
    cmd: kubectl get nodes
  delegate_to: "{{ control_plane }}"
  register: k3s_nodes
  changed_when: false

- name: Check if this node is already in the cluster
  ansible.builtin.set_fact:
    in_cluster: |
      {{ k3s_nodes.stdout is search(inventory_hostname + " *Ready") }}

- name: Remove k3s worker if k3s_force=true or the node is not in the cluster
  ansible.builtin.command:
    cmd: k3s-agent-uninstall.sh
    removes: /usr/local/bin/k3s-agent-uninstall.sh
  # uninstall if the node has been deleted from the cluster or force is true
  when: k3s_force or not in_cluster

- name: Remove the node from the cluster if it is not ready
  ansible.builtin.command:
    cmd: kubectl delete node {{ inventory_hostname }}
  delegate_to: "{{ control_plane }}"
  when: k3s_nodes.stdout is search(inventory_hostname + " *NotReady")
  changed_when: true

- name: Get the node token
  ansible.builtin.command:
    cmd: cat /var/lib/rancher/k3s/server/node-token
  delegate_to: "{{ control_plane }}"
  register: node_token
  changed_when: false

- name: Install k3s worker node version {{ k3s_version | default('latest') }}
  ansible.builtin.shell: # noqa command-instead-of-shell
    cmd: >
      INSTALL_K3S_VERSION="{{ k3s_version | default('') }}"
      K3S_URL="https://{{ control_plane_ip }}:6443"
      K3S_TOKEN="{{ node_token.stdout }}"
      /usr/local/bin/k3s-install.sh
  register: k3s_installed
  changed_when: true
  when: k3s_force or not in_cluster

- name: Set the k3s_install_occurred fact
  ansible.builtin.set_fact: # noqa no-handler
    k3s_install_occurred: true
  when: k3s_installed.changed
  changed_when: false

- name: Label RK1 nodes with node-type=rk1 (for RKLLama DaemonSet nodeSelector)
  ansible.builtin.command:
    cmd: kubectl label node {{ inventory_hostname }} node-type=rk1 --overwrite
  delegate_to: "{{ control_plane }}"
  when: type | default('') == 'rk1'
  changed_when: true

- name: Label NVIDIA GPU nodes so the device plugin DaemonSet can schedule there
  ansible.builtin.command:
    cmd: kubectl label node {{ inventory_hostname }} nvidia.com/gpu.present=true --overwrite
  delegate_to: "{{ control_plane }}"
  when: nvidia_gpu_node | default(false)
  changed_when: true

- name: Create /opt/rkllama/models directory on RK1 nodes (hostPath for DaemonSet)
  ansible.builtin.file:
    path: /opt/rkllama/models
    state: directory
    mode: "0755"
    owner: root
    group: root
  when: type | default('') == 'rk1'

- name: Taint workstation nodes with workstation=true:NoSchedule
  ansible.builtin.command:
    cmd: kubectl taint node {{ inventory_hostname }} workstation=true:NoSchedule --overwrite
  delegate_to: "{{ control_plane }}"
  when: workstation | default(false)
  changed_when: true

- name: Label workstation nodes with node-role=workstation
  ansible.builtin.command:
    cmd: kubectl label node {{ inventory_hostname }} node-role=workstation --overwrite
  delegate_to: "{{ control_plane }}"
  when: workstation | default(false)
  changed_when: true
