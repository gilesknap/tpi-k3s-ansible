# Install the control plane for k3s

- name: Remove k3s control plane if k3s_force=true
  ansible.builtin.command:
    cmd: k3s-uninstall.sh
    removes: /usr/local/bin/k3s-uninstall.sh
  when: k3s_force

- name: Create K3s config directory
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    mode: "0755"

# Split-horizon DNS for the control plane node: the kube-apiserver validates
# OIDC tokens by fetching Dex discovery from argocd.<domain>. When Cloudflare
# manages DNS, that resolves to Cloudflare IPs and may hit an Access gate.
# Point it to a worker node running the ingress instead.
- name: Add split-horizon /etc/hosts entry for cluster domain
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '.*argocd\.{{ cluster_domain }}$'
    line: >-
      {{ hostvars[(groups['all_nodes'] | difference([control_plane]))[0]]['ansible_default_ipv4']['address'] }}
      argocd.{{ cluster_domain }}
    state: present
  notify: Restart k3s

- name: Deploy K3s server configuration
  ansible.builtin.template:
    src: k3s-server-config.yml.j2
    dest: /etc/rancher/k3s/config.yaml
    mode: "0644"
  notify: Restart k3s

- name: Install k3s control plane version {{ k3s_version | default('latest') }}
  ansible.builtin.shell:
    cmd: >
      INSTALL_K3S_VERSION="{{ k3s_version | default('') }}"
      INSTALL_K3S_EXEC="server"
      /usr/local/bin/k3s-install.sh
    creates: /var/lib/rancher/k3s/server/node-token
  when: is_control_plane
  register: k3s_installed

- name: Set the k3s_install_occurred fact
  ansible.builtin.set_fact: # noqa no-handler
    k3s_install_occurred: true
  when: k3s_installed.changed
  changed_when: false
