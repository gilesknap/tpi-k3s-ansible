- name: Set helm facts
  ansible.builtin.set_fact:
    user_home: "{{ ansible_facts['env']['HOME'] }}"

- name: Get helm version 3.20.0 amd binary
  ansible.builtin.get_url:
    url: https://get.helm.sh/helm-v3.20.0-linux-amd64.tar.gz
    dest: /tmp/helm-v3.20.0-linux-amd64.tar.gz
    mode: "0644"
    checksum: "sha256:dbb4c8fc8e19d159d1a63dda8db655f9ffa4aac1b9a6b188b34a40957119b286"
    validate_certs: true

- name: Extract helm binary
  ansible.builtin.unarchive:
    src: /tmp/helm-v3.20.0-linux-amd64.tar.gz
    dest: /tmp
    remote_src: true
    mode: "0755"

# the bin folder persists through container rebuilds because it is a volume
- name: Move helm binary to the path
  ansible.builtin.copy:
    src: /tmp/linux-amd64/helm
    dest: "{{ bin_dir }}/helm"
    mode: "0755"
  become: true

# this step is lost on rebuild of the container, so is the only step
# that causes a change after container rebuild
- name: Make kubectl available to all
  ansible.builtin.file:
    src: "{{ bin_dir }}/helm"
    path: /usr/local/bin/helm
    state: link
  become: true

- name: Check if helm-diff plugin is functional
  ansible.builtin.command:
    cmd: helm diff version
  register: helm_diff_check
  failed_when: false
  changed_when: false

- name: Remove broken helm-diff plugin directory if present
  ansible.builtin.file:
    path: "{{ user_home }}/.local/share/helm/plugins/helm-diff"
    state: absent
  when: helm_diff_check.rc != 0

- name: Install helm plugins
  ansible.builtin.command:
    cmd: helm plugin install https://github.com/databus23/helm-diff
    creates: "{{ user_home }}/.local/share/helm/plugins/helm-diff"

- name: Command line completion for helm
  ansible.builtin.shell:
    cmd: helm completion {{ item.name }} > {{ item.completion_dir }}/_helm
    creates: "{{ item.completion_dir }}/_helm"
  loop: "{{ tools_shell }}"
