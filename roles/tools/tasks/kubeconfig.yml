# Copy kubeconfig from the control plane so the devcontainer can talk to the
# cluster. This duplicates roles/k3s/tasks/kubeconfig.yml but resolves the
# control plane IP independently (no k3s role facts required).
# Fails gracefully when the control plane is unreachable (e.g. first run
# before k3s is installed).

- name: Gather facts from control plane for kubeconfig
  ansible.builtin.setup:
  delegate_to: "{{ control_plane }}"
  delegate_facts: true
  ignore_errors: true
  register: tools_cp_facts

- name: Read kubeconfig from control plane
  ansible.builtin.command:
    cmd: cat /etc/rancher/k3s/k3s.yaml
  delegate_to: "{{ control_plane }}"
  become: true
  register: tools_kube_config
  changed_when: false
  ignore_errors: true
  when: tools_cp_facts is succeeded

- name: Write kubeconfig to $HOME/.kube/config
  ansible.builtin.copy:
    content: "{{ tools_kube_config.stdout | regex_replace('127.0.0.1', hostvars[control_plane]['ansible_facts']['default_ipv4']['address']) }}"
    dest: "$HOME/.kube/config"
    mode: "0600"
  when:
    - tools_cp_facts is succeeded
    - tools_kube_config is succeeded
