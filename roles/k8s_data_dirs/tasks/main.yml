# Create the host directories that back the local-nvme PVs defined in
# kubernetes-services/additions/local-storage. Each entry of
# k8s_data_dirs (group_vars/all.yml) is created only on its target
# node via inventory_hostname guard.
#
# Paths live outside /var/lib/rancher on purpose: pb_decommission.yml
# wipes /var/lib/rancher to reset k3s, but these directories are
# preserved so PVC data survives a cluster rebuild.

- name: Create k8s data directory for {{ item.name }}
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  when: inventory_hostname == item.node
  loop: "{{ k8s_data_dirs }}"
  loop_control:
    label: "{{ item.name }}"
