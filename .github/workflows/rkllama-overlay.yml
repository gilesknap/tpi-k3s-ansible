name: rkllama Overlay Container

on:
  push:
    branches: [main]
    paths:
      - "rkllama-overlay/**"
  pull_request:
    paths:
      - "rkllama-overlay/**"

jobs:
  container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tags for publishing image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/rkllama-overlay
          tags: |
            # On main: "latest" + short SHA
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # On PR/branch: "beta" + short SHA
            type=raw,value=beta,enable=${{ github.ref != 'refs/heads/main' }}
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: ./rkllama-overlay
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
