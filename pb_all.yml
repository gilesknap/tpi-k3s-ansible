- name: Install client tools in execution environment
  hosts: localhost
  roles:
    - role: tools
  tags: tools

- name: Bare metal provisioning of turing_pi nodes
  hosts: turing_pis
  gather_facts: false
  roles:
    - role: flash
      when: do_flash
  tags: flash

- name: Make sure known_hosts is up to date
  hosts: all_nodes, turing_pis
  # only gather facts after the nodes are added to known_hosts
  gather_facts: false
  serial: 1
  roles:
    - role: known_hosts
  tags: known_hosts

- name: Update all nodes in preparation for k3s
  hosts: all_nodes # all nodes in all turing pi groups and outside
  roles:
    - role: move_fs
    - role: update_packages
    # Creates /home/k8s-data/* (nuc2) and /var/lib/k8s-data/* (RK1s).
    # These back the local-nvme PVs and are preserved across rebuilds
    # by pb_decommission.yml — see roles/k8s_data_dirs/tasks/main.yml.
    - role: k8s_data_dirs
  become: true
  tags: servers

- name: Install or update k3s control plane and workers
  hosts: all_nodes # all nodes in all turing pi groups and outside
  roles:
    - role: k3s
  become: true
  tags: k3s

- name: Install cluster services
  hosts: localhost
  roles:
    - role: cluster
  tags: cluster

- name: Manage Claude sandbox's pub key on the ansible account
  hosts: all_nodes
  gather_facts: false
  tasks:
    - name: Add or remove Claude pubkey from ansible user authorized_keys
      ansible.posix.authorized_key:
        user: "{{ ansible_account }}"
        state: "{{ claude_pubkey_state | default('present') }}"
        key: "{{ lookup('file', claude_ansible_pubkey_path | default('/root/.config/claude-ssh/id_ed25519.pub')) }}"
        comment: claude-sandbox
  tags: claude_key
